<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全场1-3元包邮 直击底价</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 顶部导航 */
        .header {
            background-color: #ff4400;
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 筛选栏 - 核心对齐修改 */
        .filter-bar {
            padding: 15px 20px;
            background-color: #f5f5f5;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 1400px; /* 和商品容器宽度一致 */
            margin: 0 auto;    /* 水平居中 */
        }

        /* 筛选按钮样式优化 */
        .filter-btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            background-color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .filter-btn.active {
            background-color: #ff4400;
            color: white;
            border-color: #ff4400;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(255, 68, 0, 0.3);
        }

        /* 商品列表容器 */
        .product-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 1400px; /* 和筛选栏宽度一致 */
            margin: 0 auto;    /* 水平居中 */
        }

        /* 商品卡片 - 适配6列布局调整尺寸 */
        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product-info {
            padding: 10px;
        }

        .product-title {
            font-size: 14px;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-price {
            color: #ff4400;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-sales {
            color: #999;
            font-size: 12px;
        }

        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 800px;
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .product-detail {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .detail-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
        }

        .detail-title {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .detail-price {
            font-size: 28px;
            color: #ff4400;
            margin-bottom: 15px;
        }

        .detail-desc {
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }

        .buy-btn {
            background-color: #ff4400;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 响应式适配：小屏幕自动调整列数 */
        @media (max-width: 1200px) {
            .product-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .product-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <h1>全场1-3元包邮 直击底价</h1>
    </header>

    <!-- 筛选栏 - 秒杀专区按钮 -->
    <div class="filter-bar">
        <button class="filter-btn active" data-type="all">全部商品</button>
        <button class="filter-btn" data-type="electronics">1元包邮 秒杀专区</button>
        <button class="filter-btn" data-type="clothes">2元包邮 秒杀赚钱</button>
        <button class="filter-btn" data-type="food">3元包邮 秒杀专区</button>
    </div>

    <!-- 商品列表 -->
    <div class="product-container" id="productList">
        <!-- 商品卡片由JS动态生成 -->
    </div>

    <!-- 商品详情弹窗 -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="product-detail" id="productDetail">
                <!-- 详情内容由JS动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 1/2/3元秒杀商品数据（补充到12个，适配6列布局展示）
        const products = [
            {
                id: 1,
                title: "简约中性笔 1支装",
                price: 1,
                sales: "已售 10.2万",
                img: "https://picsum.photos/seed/pen1/400/400",
                type: "electronics",
                desc: "1元包邮！简约中性笔，0.5mm黑色笔芯，书写顺滑，办公学生必备，单支装，多买更划算。"
            },
            {
                id: 2,
                title: "卡通贴纸 1包",
                price: 2,
                sales: "已售 8.8万",
                img: "https://picsum.photos/seed/sticker1/400/400",
                type: "clothes",
                desc: "2元包邮！卡通贴纸1包，包含50张不重复图案，防水防刮，可贴手机、笔记本、水杯等。"
            },
            {
                id: 3,
                title: "便携小垃圾袋 1卷",
                price: 3,
                sales: "已售 5.5万",
                img: "https://picsum.photos/seed/bag1/400/400",
                type: "food",
                desc: "3元包邮！便携小垃圾袋1卷，共50只，加厚款，适用于桌面、车载、卫生间等场景。"
            },
            {
                id: 4,
                title: "迷你便签本 1本",
                price: 1,
                sales: "已售 7.1万",
                img: "https://picsum.photos/seed/notebook1/400/400",
                type: "electronics",
                desc: "1元包邮！迷你便签本，80张内页，纸张厚实，可撕设计，方便记录随手事项。"
            },
            {
                id: 5,
                title: "一次性口罩 5只装",
                price: 2,
                sales: "已售 9.8万",
                img: "https://picsum.photos/seed/mask1/400/400",
                type: "clothes",
                desc: "2元包邮！一次性防护口罩5只装，三层防护，透气不勒耳，日常出行必备。"
            },
            {
                id: 6,
                title: "创意钥匙扣 1个",
                price: 3,
                sales: "已售 4.9万",
                img: "https://picsum.photos/seed/keychain1/400/400",
                type: "food",
                desc: "3元包邮！创意卡通钥匙扣，材质耐用，造型可爱，可挂钥匙、背包等，送礼小礼品首选。"
            },
            {
                id: 7,
                title: "塑料收纳夹 1个",
                price: 1,
                sales: "已售 6.3万",
                img: "https://picsum.photos/seed/clamp1/400/400",
                type: "electronics",
                desc: "1元包邮！多功能塑料收纳夹，可夹文件、零食袋，耐用不易断，居家办公小帮手。"
            },
            {
                id: 8,
                title: "小发绳 5根装",
                price: 2,
                sales: "已售 11.5万",
                img: "https://picsum.photos/seed/hairband1/400/400",
                type: "clothes",
                desc: "2元包邮！高弹力小发绳5根装，不扯头发，多款颜色可选，日常扎发必备。"
            },
            {
                id: 9,
                title: "一次性纸杯 10个",
                price: 3,
                sales: "已售 4.2万",
                img: "https://picsum.photos/seed/cup1/400/400",
                type: "food",
                desc: "3元包邮！加厚一次性纸杯10个装，耐高温，适用于喝水、待客，方便卫生。"
            },
            {
                id: 10,
                title: "粘钩 3个装",
                price: 1,
                sales: "已售 8.7万",
                img: "https://picsum.photos/seed/hook1/400/400",
                type: "electronics",
                desc: "1元包邮！强力粘钩3个装，承重力强，免打孔，可挂钥匙、毛巾、小物件。"
            },
            {
                id: 11,
                title: "牙签 100根装",
                price: 2,
                sales: "已售 7.9万",
                img: "https://picsum.photos/seed/toothpick1/400/400",
                type: "clothes",
                desc: "2元包邮！天然竹制牙签100根装，尖头顺滑，居家餐饮必备，便携卫生。"
            },
            {
                id: 12,
                title: "小胶带 1卷",
                price: 3,
                sales: "已售 5.1万",
                img: "https://picsum.photos/seed/tape1/400/400",
                type: "food",
                desc: "3元包邮！透明小胶带1卷，粘性强，不易断，适用于办公、学生手工、封袋等。"
            }
        ];

        // 获取DOM元素
        const productList = document.getElementById('productList');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const modal = document.getElementById('productModal');
        const closeModal = document.getElementById('closeModal');
        const productDetail = document.getElementById('productDetail');

        // 渲染商品列表
        function renderProducts(filterType = 'all') {
            productList.innerHTML = '';
            // 筛选商品
            const filteredProducts = filterType === 'all' 
                ? products 
                : products.filter(item => item.type === filterType);
            
            // 生成商品卡片
            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.dataset.id = product.id;
                card.innerHTML = `
                    <img src="${product.img}" alt="${product.title}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">¥${product.price}</p>
                        <p class="product-sales">${product.sales}</p>
                    </div>
                `;
                // 点击商品卡片打开详情
                card.addEventListener('click', () => showProductDetail(product.id));
                productList.appendChild(card);
            });
        }

        // 显示商品详情
        function showProductDetail(productId) {
            const product = products.find(item => item.id === productId);
            if (product) {
                productDetail.innerHTML = `
                    <img src="${product.img}" alt="${product.title}" class="detail-img">
                    <div class="detail-info">
                        <h2 class="detail-title">${product.title}</h2>
                        <p class="detail-price">¥${product.price}</p>
                        <p class="detail-desc">${product.desc}</p>
                        <button class="buy-btn">立即购买</button>
                    </div>
                `;
                modal.style.display = 'flex';
            }
        }

        // 初始化
        renderProducts();

        // 筛选按钮点击事件
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除所有激活状态
                filterBtns.forEach(b => b.classList.remove('active'));
                // 添加当前激活状态
                btn.classList.add('active');
                // 渲染筛选后的商品
                renderProducts(btn.dataset.type);
            });
        });

        // 关闭弹窗
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // 点击弹窗外部关闭
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
